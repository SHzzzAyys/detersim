name: ci

on:
  push:
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: fmt
        run: cargo fmt --all --check
      - name: build
        run: cargo build --workspace
      - name: test
        run: cargo test --workspace
      - name: clippy
        run: cargo clippy --workspace -- -D warnings
      - name: docs
        run: cargo doc --workspace --no-deps
      - name: determinism lint
        run: bash scripts/lint_determinism.sh
      - name: replicated kv recall
        run: cargo test -p detersim-testkit --test replicated_kv
      - name: experiment suite
        run: cargo test -p detersim-testkit --test experiment_suite
      - name: experiment suite manifest
        run: cargo test -p detersim-testkit --test experiment_suite_manifest
      - name: coverage guided search
        run: cargo test -p detersim-search --test coverage_guided_search
      - name: search comparison
        run: cargo test -p detersim-search --test search_comparison
      - name: suite search comparison
        run: cargo test -p detersim-search --test suite_search_comparison
      - name: checker v3 models
        run: cargo test -p detersim-check --test checker_v3_models
      - name: mini raft recall
        run: cargo test -p detersim-sim --test mini_raft_recall
      - name: stream api
        run: cargo test -p detersim-net --test stream_api
      - name: label-aware shrink
        run: cargo test -p detersim-shrink --test label_aware_shrink
      - name: signature-preserving shrink
        run: cargo test -p detersim-shrink --test signature_preserving_shrink
      - name: debug artifact
        run: cargo test -p detersim-viz --test debug_artifact
      - name: debug artifact v3
        run: cargo test -p detersim-viz --test debug_artifact_v3
      - name: causal artifact v3
        run: cargo test -p detersim-viz --test causal_artifact_v3
      - name: artifact schema compatibility
        run: cargo test -p detersim-viz --test artifact_schema_compat
      - name: cli smoke
        run: cargo test -p detersim-cli --test cli_smoke
      - name: cli e2e
        run: cargo test -p detersim-cli --test cli_e2e
      - name: cli benchmark flow
        run: cargo test -p detersim-cli --test cli_benchmark_flow
      - name: cli artifact workflow
        run: cargo test -p detersim-cli --test cli_artifact_workflow
      - name: cli doctor
        run: cargo run -p detersim-cli -- doctor
      - name: cli deep doctor
        run: cargo run -p detersim-cli -- doctor --deep
      - name: cli replicated kv suite
        run: cargo run -p detersim-cli -- run-suite --suite replicated-kv --out target/detersim-artifacts/replicated-kv-suite.json
      - name: cli mini raft search comparison
        run: cargo run -p detersim-cli -- search --suite mini-raft-smoke --compare --budget 1000 --out target/detersim-artifacts/mini-raft-search.json
      - name: cli sparse discovery comparison
        run: cargo run -p detersim-cli -- search --suite sparse-discovery --compare --budget 32 --out target/detersim-artifacts/sparse-search.json
      - name: cli artifact path workflow
        run: |
          cargo run -p detersim-cli -- shrink --case missing-message --seed 0 --out target/detersim-artifacts/missing-message-shrink.json
          cargo run -p detersim-cli -- render --artifact target/detersim-artifacts/missing-message-shrink.json --out target/detersim-artifacts/missing-message-shrink.html
          cargo run -p detersim-cli -- explain --artifact target/detersim-artifacts/missing-message-shrink.json --out target/detersim-artifacts/missing-message-explain.json
      - name: v3 artifact examples
        run: cargo run -p detersim-testkit --example v3_artifacts
      - name: release determinism soak
        env:
          DST_SEED_COUNT: "10000"
        run: cargo test --release --test determinism_meta
